services:
  mongo:
    image: mongo:7
    container_name: animanager-mongo
    restart: unless-stopped
    ports:
      - "27019:27017"
    volumes:
      - ./mongo-data:/data/db
    logging:
      driver: "none"
    command: ["--quiet", "--logpath", "/dev/null"]

  gateway:
    build:
      context: ./backend
      dockerfile: proxy.Dockerfile
      target: base
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env.dev
    ports:
      - "5000:5000"
    command: npx tsx watch apps/gateway/src/server.ts
    depends_on:
      mongo:
        condition: service_started
  users_service:
    build:
      context: ./backend
      dockerfile: users.Dockerfile
      target: base
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env.dev
    ports:
      - "5001:5001"
    command: npx tsx watch apps/users_service/src/server.ts
    depends_on:
      mongo:
        condition: service_started

  catalog_service:
    build:
      context: ./backend
      dockerfile: catalog.Dockerfile
      target: base
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env.dev
    ports:
      - "5002:5002"
    command: npx tsx watch apps/catalog_service/src/server.ts
    depends_on:
      mongo:
        condition: service_started

  frontend:
    image: node:20
    working_dir: /app
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    depends_on:
      gateway:
        condition: service_started
